name: MCP Health Check

on:
  push:
    paths:
      - "**/claude_desktop_config.json"
      - "**/mcp.json"
      - "**/cline_mcp_settings.json"
      - ".github/workflows/mcp-check.yml"
  pull_request:
    paths:
      - "**/claude_desktop_config.json"
      - "**/mcp.json"
      - "**/cline_mcp_settings.json"

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Find MCP config
        id: find
        run: |
          CONFIG=$(find . -type f \( \
            -name "claude_desktop_config.json" -o \
            -name "mcp.json" -o \
            -name "cline_mcp_settings.json" \
          \) -not -path "./node_modules/*" | head -n 1)
          if [ -z "$CONFIG" ]; then
            echo "No MCP config files found in repo; skipping."
            echo "found=false" >> "$GITHUB_OUTPUT"
          else
            echo "Using config: $CONFIG"
            echo "found=true" >> "$GITHUB_OUTPUT"
            echo "config=$CONFIG" >> "$GITHUB_OUTPUT"
          fi

      - name: Run MCPFix
        if: steps.find.outputs.found == 'true'
        run: npx --yes mcpfix --config "${{ steps.find.outputs.config }}" --json > mcp-report.json

      - name: Fail on collisions
        if: steps.find.outputs.found == 'true'
        run: |
          COLLISIONS=$(jq '.collisions | length' mcp-report.json)
          if [ "$COLLISIONS" -gt 0 ]; then
            echo "::error::$COLLISIONS MCP tool collision(s) detected"
            jq '.collisions' mcp-report.json
            exit 1
          fi
          echo "No MCP conflicts detected"
