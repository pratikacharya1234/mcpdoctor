name: MCP Health Check

on:
  push:
    paths:
      - '**/claude_desktop_config.json'
      - '**/.cursor/mcp.json'
      - '**/cline_mcp_settings.json'
      - '**/mcp.json'
  pull_request:
    paths:
      - '**/claude_desktop_config.json'
      - '**/.cursor/mcp.json'
      - '**/cline_mcp_settings.json'
      - '**/mcp.json'

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Run MCPDoctor
        run: |
          npx mcpdoctor --json > mcp-report.json || true
          cat mcp-report.json
      - name: Check for conflicts
        run: |
          COLLISIONS=$(cat mcp-report.json | jq '.collisions | length')
          if [ "$COLLISIONS" -gt 0 ]; then
            echo "::warning::$COLLISIONS MCP tool name collision(s) detected"
            exit 1
          fi
          echo "No MCP conflicts detected ✓"
